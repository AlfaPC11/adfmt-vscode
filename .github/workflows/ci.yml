name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # node24
      - uses: actions/setup-node@f4a67bbeca970f103397d3d2b9462cf787cd2980 # node24
        with:
          node-version: "24"
      - name: Enable pnpm
        shell: sh
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate
      - name: Install dependencies
        shell: sh
        run: pnpm install --frozen-lockfile
      - name: Test and package
        shell: sh
        run: |
          pnpm test
          pnpm package
          VERSION=$(node -p "require('./package.json').version")
          test -f "adfmt-$VERSION.vsix"
          git diff --check
